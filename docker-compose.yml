services:
  backend:
    build: .
    container_name: backend
    env_file:
      - .env
    ports:
      - 5000:3000
    restart: always

    healthcheck:
      test: ["CMD", "curl", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build: nginx 
    container_name: nginx 
    ports:
      - 80:80
      - 443:443
    volumes:
      - /etc/nginx:/etc/nginx 
      - /etc/letsencrypt:/etc/letsencrypt
    depends_on:
      - backend 
