services:
  backend:
    build: .
    container_name: spellbound-backend 
    env_file:
      - .env
    ports:
      - 5000:3000
    restart: always

    healthcheck:
      test: ["CMD", "curl", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
