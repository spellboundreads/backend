name: Deploy via SSM
on: 
  push:
    branches: [main]

permissions:
  id-token: write 
  contents: read 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::514985057012:role/github-actions-ssm-deploy 
          aws-region: ap-southeast-2
      - name: Deploy to EC2 
        run: |
          aws ssm send-command \
          --instance-ids "i-0b8a915eadf6ff26a" \
          --document-name "AWS-RunShellScript" \
          --parameters commands='[
          "cd /home/ec2-user/backend",
          "sudo -u ec2-user git pull origin main",
          "sudo -u ec2-user docker compose down",
          "sudo -u ec2-user docker compose up -d --build",
          "cd ../nginx",
          "sudo -u ec2-user docker build -t nginx",
          "sudo -u ec2-user docker run -d -p 80:80 -v /etc/nginx:/etc/nginx -v /etc/letsencrypt:/etc/letsencrypt"
          ]'

